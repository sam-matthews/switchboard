services:
  # Reverse Proxy (TLS termination and host-based routing)
  reverse-proxy:
    image: traefik:v3.6.11
    container_name: reverse-proxy
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@sammatthews.nz}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --ping=true
      - --ping.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./reverse-proxy/dynamic:/etc/traefik/dynamic:ro
      - letsencrypt_data:/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Database (PostgreSQL)
  app-db:
    image: postgres:15.17
    container_name: app-db
    environment:
      POSTGRES_DB: notesapp
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass123
    volumes:
      - app_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d notesapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      NODE_ENV: development
      DB_HOST: app-db
      DB_PORT: 5432
      DB_NAME: notesapp
      DB_USER: appuser
      DB_PASSWORD: apppass123
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_ISSUER_URLS: ${OIDC_ISSUER_URLS:-}
      OIDC_ACCEPTED_AUDIENCES: ${OIDC_ACCEPTED_AUDIENCES:-}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_CLERK_JWT_TEMPLATE: ${VITE_CLERK_JWT_TEMPLATE:-}
    container_name: frontend
    environment:
      HOST: 0.0.0.0
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_CLERK_JWT_TEMPLATE: ${VITE_CLERK_JWT_TEMPLATE:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app_db_data:
    driver: local
  letsencrypt_data:
    driver: local