http:
  middlewares:
    keycloak-forwarded-https:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        referrerPolicy: strict-origin-when-cross-origin
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
    compress-response:
      compress: {}
