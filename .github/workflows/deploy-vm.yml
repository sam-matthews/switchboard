# Fixed / added secrets.name: Deploy To VM

on:
  workflow_run:
    workflows:
      - SBOM
    branches:
      - integration
    types:
      - completed

concurrency:
  group: vm-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Build deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=deploy.tar.gz HEAD

      - name: Validate deployment target
        run: |
          set -euo pipefail
          : "${{ secrets.VM_HOST }}"
          : "${{ secrets.VM_APP_DIR }}"
          echo "Deploy target host: ${{ secrets.VM_HOST }}"
          echo "Deploy target dir:  ${{ secrets.VM_APP_DIR }}"

      - name: Copy deployment archive to VM
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/switchboard-app-deploy"
          overwrite: true
          rm: false
          strip_components: 0

      - name: Deploy services on VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -euo pipefail

            mkdir -p "${{ secrets.VM_APP_DIR }}"
            tar -xzf /tmp/switchboard-app-deploy/deploy.tar.gz -C "${{ secrets.VM_APP_DIR }}" --no-same-owner
            rm -f /tmp/switchboard-app-deploy/deploy.tar.gz

            cd "${{ secrets.VM_APP_DIR }}"
            chmod +x ./scripts/deploy-vm.sh
            ./scripts/deploy-vm.sh "$PWD"

      - name: Verify public endpoints
        env:
          VERIFY_AUTH_HOST: 'false'
          AUTH_HOST_URL: 'https://auth.sammatthews.nz'
        run: |
          set -euo pipefail
          check_url() {
            local url="$1"
            local label="$2"
            local max_tries="${3:-12}"
            local try=1
            local code=""

            while [[ "$try" -le "$max_tries" ]]; do
              code="$(curl -sS -o /dev/null -w "%{http_code}" "$url" || true)"
              if [[ "$code" =~ ^2[0-9][0-9]$ || "$code" =~ ^3[0-9][0-9]$ ]]; then
                echo "[verify] $label OK ($code)"
                return 0
              fi
              echo "[verify] $label attempt $try/$max_tries returned HTTP $code"
              sleep 5
              try=$((try + 1))
            done

            echo "[verify] ERROR: $label failed after $max_tries attempts"
            return 1
          }

          check_frontend() {
            local root_url="https://app.sammatthews.nz"
            local fallback_url="https://app.sammatthews.nz/index.html"
            local max_tries="${1:-12}"
            local try=1
            local root_code=""
            local fallback_code=""

            while [[ "$try" -le "$max_tries" ]]; do
              root_code="$(curl -sS -L -o /dev/null -w "%{http_code}" "$root_url" || true)"
              if [[ "$root_code" =~ ^2[0-9][0-9]$ ]]; then
                echo "[verify] Frontend app OK at / (final HTTP $root_code)"
                return 0
              fi

              fallback_code="$(curl -sS -L -o /dev/null -w "%{http_code}" "$fallback_url" || true)"
              if [[ "$fallback_code" =~ ^2[0-9][0-9]$ ]]; then
                echo "[verify] Frontend app OK at /index.html (final HTTP $fallback_code), root currently $root_code"
                return 0
              fi

              echo "[verify] Frontend app attempt $try/$max_tries root=$root_code index=$fallback_code"
              sleep 5
              try=$((try + 1))
            done

            echo "[verify] Frontend headers for root path:"
            curl -sSI "$root_url" || true
            echo "[verify] ERROR: Frontend app failed after $max_tries attempts"
            return 1
          }

          # Required checks
          check_url "https://api.sammatthews.nz/api/health" "API health"

          # Frontend can occasionally return 404 at "/" during rollout/proxy reload.
          # Check both "/" and "/index.html" on each retry to avoid false-negative deploy failures.
          check_frontend 12

          # Optional auth host verification. Disabled by default because many environments
          # use external OIDC providers (for example Clerk) instead of the auth host.
          if [[ "$VERIFY_AUTH_HOST" == "true" ]]; then
            if ! check_url "$AUTH_HOST_URL" "Auth host" 3; then
              echo "[verify] Auth host check failed; continuing because auth service is optional in this deployment"
            fi
          else
            echo "[verify] Skipping optional auth host verification (VERIFY_AUTH_HOST=false)"
          fi

          # Skip Traefik service-DNS/localhost ping checks: GitHub-hosted runners cannot
          # resolve VM-internal Docker DNS names or localhost service ports on the VM.
          echo "[verify] Skipping Traefik internal ping checks from hosted runner context"

      - name: Prune unused Docker images on VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -euo pipefail
            echo "Pruning unused Docker images..."
            docker image prune -af
            echo "Docker image prune complete."
