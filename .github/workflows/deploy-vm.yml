# Fixed / added secrets.name: Deploy To VM

on:
  push:
    branches:
      - integration
  workflow_dispatch:

concurrency:
  group: vm-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    environment: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build deployment archive
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=deploy.tar.gz HEAD

      - name: Validate deployment target
        run: |
          set -euo pipefail
          : "${{ secrets.VM_HOST }}"
          : "${{ secrets.VM_APP_DIR }}"
          echo "Deploy target host: ${{ secrets.VM_HOST }}"
          echo "Deploy target dir:  ${{ secrets.VM_APP_DIR }}"

      - name: Copy deployment archive to VM
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          source: "deploy.tar.gz"
          target: "/tmp/switchboard-app-deploy"
          overwrite: true
          rm: false
          strip_components: 0

      - name: Deploy services on VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -euo pipefail

            mkdir -p "${{ secrets.VM_APP_DIR }}"
            tar -xzf /tmp/switchboard-app-deploy/deploy.tar.gz -C "${{ secrets.VM_APP_DIR }}" --no-same-owner
            rm -f /tmp/switchboard-app-deploy/deploy.tar.gz

            cd "${{ secrets.VM_APP_DIR }}"
            chmod +x ./scripts/deploy-vm.sh
            ./scripts/deploy-vm.sh "$PWD"

      - name: Verify public endpoints
        run: |
          set -euo pipefail
          check_url() {
            local url="$1"
            local label="$2"
            local max_tries="${3:-12}"
            local try=1
            local code=""

            while [[ "$try" -le "$max_tries" ]]; do
              code="$(curl -sS -o /dev/null -w "%{http_code}" "$url" || true)"
              if [[ "$code" =~ ^2[0-9][0-9]$ || "$code" =~ ^3[0-9][0-9]$ ]]; then
                echo "[verify] $label OK ($code)"
                return 0
              fi
              echo "[verify] $label attempt $try/$max_tries returned HTTP $code"
              sleep 5
              try=$((try + 1))
            done

            echo "[verify] ERROR: $label failed after $max_tries attempts"
            return 1
          }

          check_frontend() {
            local root_url="https://app.sammatthews.nz"
            local fallback_url="https://app.sammatthews.nz/index.html"
            local max_tries="${1:-12}"
            local try=1
            local root_code=""
            local fallback_code=""

            while [[ "$try" -le "$max_tries" ]]; do
              root_code="$(curl -sS -o /dev/null -w "%{http_code}" "$root_url" || true)"
              if [[ "$root_code" =~ ^2[0-9][0-9]$ || "$root_code" =~ ^3[0-9][0-9]$ ]]; then
                echo "[verify] Frontend app OK at / ($root_code)"
                return 0
              fi

              fallback_code="$(curl -sS -o /dev/null -w "%{http_code}" "$fallback_url" || true)"
              if [[ "$fallback_code" =~ ^2[0-9][0-9]$ || "$fallback_code" =~ ^3[0-9][0-9]$ ]]; then
                echo "[verify] Frontend app OK at /index.html ($fallback_code), root currently $root_code"
                return 0
              fi

              echo "[verify] Frontend app attempt $try/$max_tries root=$root_code index=$fallback_code"
              sleep 5
              try=$((try + 1))
            done

            echo "[verify] Frontend headers for root path:"
            curl -sSI "$root_url" || true
            echo "[verify] ERROR: Frontend app failed after $max_tries attempts"
            return 1
          }

          # Required checks
          check_url "https://api.sammatthews.nz/api/health" "API health"

          # Frontend can occasionally return 404 at "/" during rollout/proxy reload.
          # Check both "/" and "/index.html" on each retry to avoid false-negative deploy failures.
          check_frontend 12

          # Optional check: this stack may not include Keycloak in all environments.
          if ! check_url "https://auth.sammatthews.nz" "Auth host" 3; then
            echo "[verify] Auth host check failed; continuing because auth service is optional in this deployment"
          fi

          # Traefik ping endpoint is optional from GitHub-hosted runner context.
          if ! check_url "http://reverse-proxy:80/ping" "Traefik ping via service DNS" 2; then
            if ! check_url "http://localhost/ping" "Traefik ping via localhost" 2; then
              check_url "https://app.sammatthews.nz/ping" "Traefik ping via public host" 2 || echo "[verify] Warning: Traefik /ping endpoint not reachable from this context"
            fi
          fi

      - name: Prune unused Docker images on VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -euo pipefail
            echo "Pruning unused Docker images..."
            docker image prune -af
            echo "Docker image prune complete."
