name: Dependency Guard

on:
  pull_request:
    paths:
      - 'package.json'
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - '.github/security/blocked-packages.json'
      - '.github/security/dependency-age-policy.json'
      - 'scripts/verify-dependencies.js'
  push:
    branches:
      - integration
    paths:
      - 'package.json'
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - '.github/security/blocked-packages.json'
      - '.github/security/dependency-age-policy.json'
      - 'scripts/verify-dependencies.js'

jobs:
  dependency-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --prefix backend --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci --prefix frontend --ignore-scripts

      - name: Enforce dependency policy
        run: npm run security:deps
