name: Dependency Guard

on:
  pull_request:
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - '.github/security/blocked-packages.json'
      - '.github/security/dependency-age-policy.json'
      - 'scripts/verify-dependencies.js'
  push:
    branches:
      - integration
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - '.github/security/blocked-packages.json'
      - '.github/security/dependency-age-policy.json'
      - 'scripts/verify-dependencies.js'

jobs:
  dependency-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Enforce dependency policy
        run: node scripts/verify-dependencies.js
