name: Image Age Policy

on:
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/security/image-policy.json'
      - 'scripts/verify-images.js'
      - '.github/workflows/security-scan.yml'
  push:
    branches:
      - integration
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/security/image-policy.json'
      - 'scripts/verify-images.js'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  image-age-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Enforce image minimum-age policy
        run: node scripts/verify-images.js
