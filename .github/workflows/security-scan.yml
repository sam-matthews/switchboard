name: Image Age Policy

on:
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/security/image-policy.json'
      - 'scripts/verify-images.js'
      - '.github/workflows/security-scan.yml'
  push:
    branches:
      - integration
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/security/image-policy.json'
      - 'scripts/verify-images.js'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  image-age-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Enforce image minimum-age policy
        run: npm run security:images:age
